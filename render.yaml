services:
  - type: web
    name: my-remote-pc
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PASSWORD
        sync: false
      - key: AGENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
