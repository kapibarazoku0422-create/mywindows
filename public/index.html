<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#070b14"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>My Remote PC</title><link rel="manifest" href="/manifest.webmanifest"><link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <section id="login" class="card">
      <h1>My Remote PC</h1><p>自分のPCへ安全に接続</p>
      <form id="loginForm"><label>パスワード<input id="password" type="password" minlength="12" autocomplete="current-password" required></label><button>ログイン</button></form>
      <div id="loginError" class="error"></div>
    </section>
    <section id="remote" hidden>
      <header><strong>My Remote PC</strong><span id="badge">確認中</span><button id="connect">接続</button><button id="fullscreen">全画面</button><button id="logout">終了</button></header>
      <div id="screenWrap"><video id="screen" autoplay playsinline></video><div id="hint">PCがオンラインになるまでお待ちください</div></div>
      <div id="toolbar"><button data-key="Escape">Esc</button><button data-key="Tab">Tab</button><button data-key="Meta">Win</button><button data-combo="ctrl-alt-delete">Ctrl Alt Del</button><button id="keyboard">⌨︎ キーボード</button></div>
      <input id="keyboardInput" aria-label="キーボード入力" autocomplete="off" autocapitalize="off">
      <div id="rotateNotice"><strong>端末を横向きにしてください</strong><span>横向きになると操作画面を表示します</span></div>
    </section>
  </main><script src="/app.js" defer></script>
</body></html>
